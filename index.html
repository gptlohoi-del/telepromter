<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Pro - Fixed PC & Long Press</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #111111;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }
        /* Giao diện hiển thị chữ chính */
        #prompter-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 45vh 8% 50vh 8%; 
            scroll-behavior: auto; /* Tắt smooth để cuộn mượt bằng JS trên PC */
        }
        /* Ẩn thanh cuộn */
        #prompter-container::-webkit-scrollbar { display: none; }
        #prompter-container { -ms-overflow-style: none; scrollbar-width: none; }

        #content {
            font-size: 42px;
            line-height: 1.6;
            font-weight: bold;
            text-align: left;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        #content p { margin-bottom: 1.5em; }

        /* Nút ẩn/hiện bảng điều khiển */
        #toggle-panel-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Thanh điều khiển nổi */
        .floating-panel {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(25, 25, 25, 0.95);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            z-index: 1000;
            min-width: 280px;
            transition: all 0.3s ease;
        }
        .floating-panel.hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .control-label {
            font-size: 13px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 1;
        }
        .btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn:hover { background: #444; }
        .btn:active { background: #007acc; }
        
        .value-display {
            font-size: 15px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
            background: #000;
            padding: 5px 8px;
            border-radius: 4px;
            color: #00ffcc;
        }
        
        .part-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        .btn-part { padding: 6px; font-size: 13px; }
        .btn-part.active { background: #007acc; border-color: #00a2ff; }

        #status-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 122, 204, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            display: none;
            z-index: 2000;
        }
        .shortcuts-info {
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #444;
            padding-top: 8px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="status-msg">Đang tải...</div>

    <div id="prompter-container">
        <div id="content">Đang kết nối API... Vui lòng đợi hoặc bấm phím số 1-7 để chọn Part.</div>
    </div>

    <button id="toggle-panel-btn" onclick="togglePanel()">⚙️</button>

    <div class="floating-panel" id="panel">
        <div class="control-row">
            <span class="control-label">Tốc độ (↑/↓)</span>
            <button class="btn" id="btn-speed-minus">-</button>
            <span id="speed-val" class="value-display">2</span>
            <button class="btn" id="btn-speed-plus">+</button>
        </div>
        
        <div class="control-row">
            <span class="control-label">Cỡ chữ</span>
            <button class="btn" onclick="adjustFont(-4)">-</button>
            <span id="font-val" class="value-display">42px</span>
            <button class="btn" onclick="adjustFont(4)">+</button>
        </div>

        <div class="control-row">
            <span class="control-label">Trạng thái</span>
            <button class="btn" id="btn-toggle" style="flex: 2; background: #007acc;" onclick="toggleScroll()">Cuộn: Bật</button>
        </div>

        <div class="control-label" style="margin-top: 4px;">Chọn Part (Phím số 1-7)</div>
        <div class="part-selector">
            <button class="btn btn-part" id="p1" onclick="loadPart(1)">P1</button>
            <button class="btn btn-part" id="p2" onclick="loadPart(2)">P2</button>
            <button class="btn btn-part" id="p3" onclick="loadPart(3)">P3</button>
            <button class="btn btn-part" id="p4" onclick="loadPart(4)">P4</button>
            <button class="btn btn-part" id="p5" onclick="loadPart(5)">P5</button>
            <button class="btn btn-part" id="p6" onclick="loadPart(6)">P6</button>
            <button class="btn btn-part" id="p7" onclick="loadPart(7)">P7</button>
        </div>

        <div class="shortcuts-info">
            • <b>Phím Space (Cách):</b> Dừng / Chạy cuộn chữ<br>
            • <b>Mũi tên Lên / Xuống:</b> Tăng / Giảm tốc độ<br>
            • <b>Phím số 1 - 7:</b> Chuyển nhanh giữa các Part
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://script.google.com/macros/s/AKfycbxI0EO2Q5nOVkEaj7YQIaCU_PxGwzk9oI9j3ZT05k2mNfLoflgE7f0akAXQXWMepZXp/exec";
        
        let currentSpeed = 2; 
        let fontSize = 42;    
        let isScrolling = true; 
        let currentPart = 1;
        let cachedData = {};  
        let scrollYPos = 0; // Biến ảo để cuộn chính xác trên PC
        
        const container = document.getElementById('prompter-container');
        const contentDiv = document.getElementById('content');
        const speedVal = document.getElementById('speed-val');
        const fontVal = document.getElementById('font-val');
        const btnToggle = document.getElementById('btn-toggle');
        const statusMsg = document.getElementById('status-msg');
        const panel = document.getElementById('panel');

        function showStatus(text, duration = 2000) {
            statusMsg.innerText = text;
            statusMsg.style.display = 'block';
            if(duration > 0) {
                setTimeout(() => { statusMsg.style.display = 'none'; }, duration);
            }
        }

        // Ẩn / Hiện bảng điều khiển
        function togglePanel() {
            panel.classList.toggle('hidden');
        }

        // Tải dữ liệu Part
        function loadPart(partNumber) {
            currentPart = partNumber;
            document.querySelectorAll('.btn-part').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`p${partNumber}`);
            if(activeBtn) activeBtn.classList.add('active');

            if (cachedData[partNumber]) {
                contentDiv.innerHTML = cachedData[partNumber];
                scrollYPos = 0;
                container.scrollTop = 0;
                showStatus(`Đang hiển thị Part ${partNumber}`);
                return;
            }

            showStatus(`Đang tải dữ liệu Part ${partNumber}...`, 0);
            const fetchUrl = `${API_BASE_URL}?part=${partNumber}`;

            fetch(fetchUrl)
                .then(response => response.text())
                .then(data => {
                    let formattedContent = data;
                    try {
                        const jsonData = JSON.parse(data);
                        formattedContent = jsonData.content || jsonData.text || jsonData.data || data;
                    } catch (e) {}

                    cachedData[partNumber] = formattedContent;
                    contentDiv.innerHTML = formattedContent;
                    scrollYPos = 0;
                    container.scrollTop = 0;
                    statusMsg.style.display = 'none';
                })
                .catch(error => {
                    console.error("Lỗi kết nối:", error);
                    // Nội dung giả lập thông minh đề phòng lỗi mạng hoặc CORS chặn trên PC
                    let mockText = `<h3>[Nội dung giả lập - Part ${partNumber}]</h3>`;
                    for(let i=1; i<=20; i++) {
                        mockText += `<p>Đây là dòng văn bản thứ ${i} của Part ${partNumber}. Hệ thống cuộn chữ trên PC đã hoạt động hoàn hảo. Bạn có thể đè giữ nút tốc độ để tăng nhanh.</p>`;
                    }
                    contentDiv.innerHTML = mockText;
                    scrollYPos = 0;
                    container.scrollTop = 0;
                    statusMsg.style.display = 'none';
                });
        }

        // Khởi chạy tự động Part 1
        loadPart(1);

        // Hàm vòng lặp cuộn chữ ổn định cho cả PC & Mobile
        function autoScroll() {
            if (isScrolling && currentSpeed > 0) {
                // Tăng giá trị biến ảo theo tốc độ
                scrollYPos += (currentSpeed * 0.4);
                container.scrollTop = scrollYPos;
                
                // Đồng bộ lại nếu người dùng dùng chuột cuộn tay tự do
                if (Math.abs(container.scrollTop - scrollYPos) > 10) {
                    scrollYPos = container.scrollTop;
                }
            }
            requestAnimationFrame(autoScroll);
        }
        requestAnimationFrame(autoScroll);

        function toggleScroll() {
            isScrolling = !isScrolling;
            if (isScrolling) {
                btnToggle.innerText = "Cuộn: Bật";
                btnToggle.style.background = "#007acc";
            } else {
                btnToggle.innerText = "Cuộn: Tạm dừng";
                btnToggle.style.background = "#cc2929";
            }
        }

        function adjustSpeed(amount) {
            currentSpeed += amount;
            if (currentSpeed < 0) currentSpeed = 0;
            if (currentSpeed > 40) currentSpeed = 40;
            speedVal.innerText = currentSpeed;
        }

        function adjustFont(amount) {
            fontSize += amount;
            if (fontSize < 16) fontSize = 16;
            if (fontSize > 140) fontSize = 140;
            contentDiv.style.fontSize = fontSize + 'px';
            fontVal.innerText = fontSize + 'px';
        }

        // --- XỬ LÝ ĐÈ GIỮ NÚT (LONG PRESS) ĐỂ TĂNG/GIẢM TỐC ĐỘ LIÊN TỤC ---
        let speedInterval = null;
        function startAdjustingSpeed(amount) {
            adjustSpeed(amount); // Chạy phát đầu tiên ngay khi bấm xuống
            if(speedInterval) clearInterval(speedInterval);
            speedInterval = setInterval(() => {
                adjustSpeed(amount);
            }, 120); // Cứ mỗi 120ms đè nút sẽ tự cộng/trừ tiếp
        }
        function stopAdjustingSpeed() {
            if(speedInterval) {
                clearInterval(speedInterval);
                speedInterval = null;
            }
        }

        const btnMinus = document.getElementById('btn-speed-minus');
        const btnPlus = document.getElementById('btn-speed-plus');

        // Bắt sự kiện chuột trên PC
        btnMinus.addEventListener('mousedown', () => startAdjustingSpeed(-1));
        btnPlus.addEventListener('mousedown', () => startAdjustingSpeed(1));
        window.addEventListener('mouseup', stopAdjustingSpeed);

        // Bắt sự kiện chạm cảm ứng trên Điện thoại
        btnMinus.addEventListener('touchstart', (e) => { e.preventDefault(); startAdjustingSpeed(-1); });
        btnPlus.addEventListener('touchstart', (e) => { e.preventDefault(); startAdjustingSpeed(1); });
        window.addEventListener('touchend', stopAdjustingSpeed);


        // --- XỬ LÝ BÀN PHÍM PC (MŨI TÊN & SỐ 1-7) ---
        window.addEventListener('keydown', function(event) {
            // Chỉ preventDefault các phím chức năng cuộn để tránh đứng trang
            if (['ArrowUp', 'ArrowDown', ' '].includes(event.key)) {
                event.preventDefault();
            }
            if (event.key === 'ArrowUp') {
                adjustSpeed(1);
            } else if (event.key === 'ArrowDown') {
                adjustSpeed(-1);
            } else if (event.key === ' ') {
                toggleScroll();
            }
        });

        window.addEventListener('keyup', function(event) {
            // Nhận diện phím số từ 1 đến 7 độc lập khi nhả phím để đảm bảo độ nhạy
            if (event.key >= '1' && event.key <= '7') {
                const targetPart = parseInt(event.key);
                loadPart(targetPart);
            }
        });

    </script>
</body>
</html>
